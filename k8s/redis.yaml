apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  labels:
    service: redis

spec:
  replicas: 1
  selector:
    matchLabels:
      service: redis
  template:
    metadata:
      labels:
        service: redis
    spec:
      containers:
        - name: redis
          image: redis:8-alpine
          ports:
            - containerPort: 6379

---

apiVersion: v1
kind: Service
metadata:
  name: redis-service

spec:
  selector:
    service: redis
  ports:
    - port: 6379
      targetPort: 6379
