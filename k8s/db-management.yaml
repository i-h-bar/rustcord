                      name: app-secrets
                      key: POSTGRES_DB
                - name: POSTGRES_HOST
                  valueFrom:
                    secretKeyRef:
                      name: app-secrets
                      key: POSTGRES_HOST
                - name: IMAGES_DIR
                  value: /var/mtg_cards
                - name: BOT_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: app-secrets
                      key: BOT_TOKEN
                - name: APPLICATION_ID
                  valueFrom:
                    secretKeyRef:
                      name: app-secrets
                      key: APPLICATION_ID
                - name: USER_AGENT
