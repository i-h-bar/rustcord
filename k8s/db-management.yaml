apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
spec:
  ttlSecondsAfterFinished: 86400
  activeDeadlineSeconds: 3600
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: db-migrate
          image: gitfrog/rustcord-sync:latest
          command: ["sqlx", "migrate", "run"]
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PW
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_PW
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_DB
            - name: POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_HOST
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PW)@$(POSTGRES_HOST)/$(POSTGRES_DB)"

---

apiVersion: batch/v1
kind: CronJob
metadata:
  name: bulk-sync

spec:
  schedule: "0 6 * * 3"  # Wednesday 06:00 UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 18000
      ttlSecondsAfterFinished: 604800
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: bulk-sync
              image: gitfrog/rustcord-sync:latest
              command: ["/app/sync", "bulk"]
              env:
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: app-secrets
                      key: POSTGRES_USER
                - name: POSTGRES_PW
                  valueFrom:
                    secretKeyRef:
                      name: app-secrets
                      key: POSTGRES_PW
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: app-secrets
                      key: POSTGRES_DB
                - name: POSTGRES_HOST
                  valueFrom:
                    secretKeyRef:
                      name: app-secrets
                      key: POSTGRES_HOST
                - name: IMAGES_DIR
                  value: /var/mtg_cards
                - name: BOT_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: app-secrets
                      key: BOT_TOKEN
                - name: APPLICATION_ID
                  valueFrom:
                    secretKeyRef:
                      name: app-secrets
                      key: APPLICATION_ID
                - name: USER_AGENT
                  valueFrom:
                    secretKeyRef:
                      name: app-secrets
                      key: USER_AGENT
                - name: RUST_LOG
                  value: warn,sync=info
              volumeMounts:
                - name: images
                  mountPath: /var/mtg_cards

          volumes:
            - name: images
              hostPath:
                path: /var/mtg_cards/

---

