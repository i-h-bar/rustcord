apiVersion: v1
kind: ServiceAccount
metadata:
  name: sync-jobs

---

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sync-job-pod-reader
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sync-job-pod-reader
subjects:
  - kind: ServiceAccount
    name: sync-jobs
roleRef:
  kind: Role
  name: sync-job-pod-reader
  apiGroup: rbac.authorization.k8s.io

---

apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
spec:
  ttlSecondsAfterFinished: 86400
  activeDeadlineSeconds: 3600
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: db-migrate
          image: gitfrog/rustcord-sync:latest
          command: ["sqlx", "migrate", "run"]
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PW
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_PW
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_DB
            - name: POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_HOST
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PW)@$(POSTGRES_HOST)/$(POSTGRES_DB)"

---

apiVersion: batch/v1
kind: CronJob
metadata:
  name: bulk-sync

spec:
  schedule: "0 6 * * 3"  # Wednesday 06:00 UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 18000
      ttlSecondsAfterFinished: 604800
      template:
        metadata:
          labels:
            sync-type: bulk
        spec:
          serviceAccountName: sync-jobs
          restartPolicy: Never
          initContainers:
            - name: wait-for-spoiler-sync
              image: bitnami/kubectl:latest
              command:
                - sh
                - -c
                - |
                  while kubectl get pods -l sync-type=spoiler --field-selector=status.phase=Running --no-headers 2>/dev/null | grep -q .; do
                    echo "Waiting for spoiler sync to finish..."
                    sleep 10
                  done
          containers:
            - name: bulk-sync
              image: gitfrog/rustcord-sync:latest
              command: ["/app/sync", "bulk"]
              env:
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: app-secrets
                      key: POSTGRES_USER
                - name: POSTGRES_PW
                  valueFrom:
                    secretKeyRef:
                      name: app-secrets
                      key: POSTGRES_PW
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: app-secrets
                      key: POSTGRES_DB
                - name: POSTGRES_HOST
                  valueFrom:
                    secretKeyRef:
                      name: app-secrets
                      key: POSTGRES_HOST
                - name: IMAGES_DIR
                  value: /var/mtg_cards
                - name: BOT_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: app-secrets
                      key: BOT_TOKEN
                - name: APPLICATION_ID
                  valueFrom:
                    secretKeyRef:
                      name: app-secrets
                      key: APPLICATION_ID
                - name: USER_AGENT
                  valueFrom:
                    secretKeyRef:
                      name: app-secrets
                      key: USER_AGENT
                - name: RUST_LOG
                  value: warn,sync=info
              volumeMounts:
                - name: images
                  mountPath: /var/mtg_cards

          volumes:
            - name: images
              hostPath:
                path: /var/mtg_cards/

---

apiVersion: batch/v1
kind: CronJob
metadata:
  name: spoiler-sync

spec:
  schedule: "0 */4 * * *"  # Every 4 hours
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 600
      ttlSecondsAfterFinished: 14400
      template:
        metadata:
          labels:
            sync-type: spoiler
        spec:
          serviceAccountName: sync-jobs
          restartPolicy: Never
          initContainers:
            - name: check-bulk-sync
              image: bitnami/kubectl:latest
              command:
                - sh
                - -c
                - |
                  if kubectl get pods -l sync-type=bulk --field-selector=status.phase=Running --no-headers 2>/dev/null | grep -q .; then
                    echo "Bulk sync is running — skipping spoiler sync"
                    exit 1
                  fi
          containers:
            - name: spoiler-sync
              image: gitfrog/rustcord-sync:latest
              command: ["/app/sync", "spoilers"]
              env:
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: app-secrets
                      key: POSTGRES_USER
                - name: POSTGRES_PW
                  valueFrom:
                    secretKeyRef:
                      name: app-secrets
                      key: POSTGRES_PW
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: app-secrets
                      key: POSTGRES_DB
                - name: POSTGRES_HOST
                  valueFrom:
                    secretKeyRef:
                      name: app-secrets
                      key: POSTGRES_HOST
                - name: IMAGES_DIR
                  value: /var/mtg_cards
                - name: BOT_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: app-secrets
                      key: BOT_TOKEN
                - name: APPLICATION_ID
                  valueFrom:
                    secretKeyRef:
                      name: app-secrets
                      key: APPLICATION_ID
                - name: USER_AGENT
                  valueFrom:
                    secretKeyRef:
                      name: app-secrets
                      key: USER_AGENT
                - name: RUST_LOG
                  value: warn,sync=info
              volumeMounts:
                - name: images
                  mountPath: /var/mtg_cards

          volumes:
            - name: images
              hostPath:
                path: /var/mtg_cards/