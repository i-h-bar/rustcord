name: Deploy The Bot
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  db-changes:
    runs-on: ubuntu-20.04
    outputs:
      db: ${{ steps.filter.outputs.db }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            db:
              - 'packages/db/**'

  build-db-management:
    needs: db-changes
    if: needs.changes.outputs.db == 'true'
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: docker build -f packages/db/Dockerfile -t ${{ secrets.DOCKER_USERNAME }}/rustcord-db-management .

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/rustcord-db-management:latest

  build-bot:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Tests
        run: cargo test

      - name: Login to Docker Hub
        run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: docker build -f packages/bot/Dockerfile -t ${{ secrets.DOCKER_USERNAME }}/rustcord .

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/rustcord:latest

  deploy-bot:
    needs: build-bot
    runs-on: self-hosted
    steps:
      - name: Login to Docker Hub
        run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull Image From Docker
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/rustcord:latest

      - name: Delete Old Container
        run: docker rm -f rustcord-container
        continue-on-error: true

      - name: Run Docker Container
        run: |
          docker run -d \
          --name rustcord-container \
          --restart=always \
          --add-host=host.docker.internal:host-gateway \
          -v '${{ secrets.HOST_IMAGE_DIR }}:${{ secrets.IMAGES_DIR }}' \
          -e BOT_TOKEN='${{ secrets.BOT_TOKEN }}' \
          -e PSQL_URI='${{ secrets.PSQL_URI }}' \
          -e IMAGES_DIR='${{ secrets.IMAGES_DIR }}' \
          -e RUST_LOG='${{ secrets.RUST_LOG }}' \
          -e REDIS_URL='${{ secrets.REDIS_URL }}' \
          ${{ secrets.DOCKER_USERNAME }}/rustcord:latest
