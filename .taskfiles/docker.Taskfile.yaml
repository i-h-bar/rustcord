version: '3'

tasks:
  build-sync: docker build -f packages/sync/Dockerfile -t gitfrog/rustcord-sync .
  push-sync:
    deps:
      - build-sync
    cmds:
      - docker push gitfrog/rustcord-sync:latest

  build-discord-bot: docker build -f packages/bot/Dockerfile -t gitfrog/rustcord .
  push-discord-bot:
    deps:
      - build-discord-bot
    cmds:
      - docker push gitfrog/rustcord:latest