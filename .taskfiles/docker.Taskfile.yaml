version: '3'

tasks:
  build-db: docker build -f packages/db/Dockerfile -t gitfrog/rustcord-db-management .
  push-db:
    deps:
      - build-db
    cmds:
      - docker push gitfrog/rustcord-db-management:latest

  build-discord-bot: docker build -f packages/bot/Dockerfile -t gitfrog/rustcord .
  push-discord-bot:
    deps:
      - build-discord-bot
    cmds:
      - docker push gitfrog/rustcord:latest